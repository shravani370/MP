# Alembic configuration file
# https://alembic.sqlalchemy.org/en/latest/

[alembic]
# path to migration scripts
script_location = alembic

# template used to generate migration file names
file_template = %%(rev)s_%%(slug)s

# sys.path path, will be prepended to sys.path if present
prepend_sys_path = .

# timezone to use when rendering the date
# within the migration file as well as the filename.
# string value is passed to zoneinfo.ZoneInfo()
# Leave as `null` if timestamps should be in UTC in both cases
sqlalchemy.timezone =

# max length of characters to apply to the
# "slug" field when generating a new migration
# when the revision message was passed in that had
# Unicode characters
# max_identifier_length = 63

# set to 'true' to run the environment during
# the 'revision' command, regardless of autogenerate
# revision_environment = false

# set to 'true' to allow .pyc and .pyo files without
# a source .py file to be detected as revisions in the
# versions/ directory
# sourceless = false

# set to 'true' to skip the automatic
# creation of new alembic.ini file
# when revision files
# are created
# keep_on_top = false

# Do not version control sqlalchemy.url, use DATABASE_URL env var
# sqlalchemy.url = driver://user:password@localhost/dbname

[loggers]
keys = root,sqlalchemy

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
