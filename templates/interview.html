<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chat Interview | InterviewPro AI</title>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --green-50: #f0fdf4;
      --green-100: #dcfce7;
      --green-200: #bbf7d0;
      --green-400: #4ade80;
      --green-500: #22c55e;
      --green-600: #16a34a;
      --green-900: #064e3b;
      --gray-700: #374151;
      --gray-800: #1f2937;
    }

    body {
      font-family: 'Sora', sans-serif;
      background: var(--gray-800);
      color: white;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ========== HEADER ========== */
    .header {
      background: linear-gradient(135deg, var(--green-50) 0%, #ecffe0 100%);
      color: var(--green-900);
      padding: 20px 40px;
      border-bottom: 1px solid rgba(34,197,94,.2);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .logo {
      font-size: 18px;
      font-weight: 800;
      color: var(--green-600);
    }

    .logo span { color: var(--green-900); }

    .interview-info {
      display: flex;
      gap: 20px;
      font-size: 13px;
      font-weight: 600;
    }

    /* ========== CHAT AREA ========== */
    .chat-container {
      flex: 1;
      overflow-y: auto;
      padding: 30px 40px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      max-width: 800px;
      margin: 0 auto;
      width: 100%;
    }

    /* ========== MESSAGES ========== */
    .message {
      display: flex;
      padding: 14px 18px;
      border-radius: 12px;
      max-width: 85%;
      word-wrap: break-word;
      line-height: 1.5;
      font-size: 14px;
      animation: slideIn 0.3s ease;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .message.ai {
      background: linear-gradient(135deg, rgba(34,197,94,.15) 0%, rgba(22,163,74,.1) 100%);
      border: 1px solid rgba(34,197,94,.3);
      color: #e0f2fe;
      align-self: flex-start;
      margin-right: auto;
    }

    .message.ai::before {
      content: "🤖";
      margin-right: 10px;
      font-size: 16px;
    }

    /* Feedback messages - styled differently */
    .message.ai.feedback {
      background: linear-gradient(135deg, rgba(22,163,74,.2) 0%, rgba(34,197,94,.15) 100%);
      border: 2px solid rgba(34,197,94,.4);
      font-style: italic;
      color: #d1f2eb;
    }

    .message.ai.feedback::before {
      content: "💬";
    }

    .message.user {
      background: linear-gradient(135deg, var(--green-500), var(--green-600));
      color: white;
      align-self: flex-end;
      margin-left: auto;
      box-shadow: 0 4px 12px rgba(34,197,94,.2);
    }

    .message.user::before {
      content: "👤";
      margin-right: 10px;
      font-size: 16px;
    }

    /* ========== INPUT AREA ========== */
    .input-section {
      background: var(--gray-700);
      border-top: 1px solid rgba(34,197,94,.2);
      padding: 20px 40px;
      display: flex;
      gap: 12px;
    }

    .input-wrapper {
      flex: 1;
      display: flex;
      gap: 12px;
    }

    input[type="text"] {
      flex: 1;
      background: var(--gray-800);
      border: 1.5px solid var(--green-600);
      border-radius: 12px;
      padding: 12px 16px;
      color: white;
      font-family: 'Sora', sans-serif;
      font-size: 14px;
      transition: all 0.3s;
    }

    input[type="text"]:focus {
      outline: none;
      border-color: var(--green-400);
      background: rgba(34,197,94,.05);
      box-shadow: 0 0 0 3px rgba(34,197,94,.1);
    }

    input[type="text"]::placeholder {
      color: rgba(255,255,255,.4);
    }

    button {
      background: linear-gradient(135deg, var(--green-500), var(--green-600));
      color: white;
      border: none;
      border-radius: 12px;
      padding: 12px 28px;
      font-family: 'Sora', sans-serif;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s;
      font-size: 14px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(34,197,94,.3);
    }

    button:active {
      transform: scale(.97);
    }

    /* ========== SCROLLBAR ========== */
    .chat-container::-webkit-scrollbar {
      width: 6px;
    }

    .chat-container::-webkit-scrollbar-thumb {
      background: rgba(34,197,94,.3);
      border-radius: 10px;
    }

    .chat-container::-webkit-scrollbar-thumb:hover {
      background: rgba(34,197,94,.5);
    }

    /* ========== RESPONSIVE ========== */
    @media (max-width: 768px) {
      .header { padding: 15px 20px; }
      .chat-container { padding: 20px; max-width: 100%; }
      .input-section { padding: 15px 20px; flex-direction: column; }
      .message { max-width: 95%; }
    }
  </style>
</head>

<body>

  <!-- HEADER -->
  <div class="header">
    <div>
      <div class="logo">Interview<span>Pro</span> AI</div>
      <div style="font-size: 12px; color: var(--green-700); margin-top: 4px;">Text-based Interview</div>
    </div>
    <div class="interview-info">
      <div>💬 Conversational Mode</div>
      <div>⏱️ Real-time Feedback</div>
    </div>
  </div>

  <!-- CHAT CONTAINER -->
  <div class="chat-container" id="chatContainer">
    {% for msg in messages %}
      <div class="message {{ msg.role }}{% if msg.type is defined and msg.type == 'feedback' %} feedback{% endif %}">
        {{ msg.text }}
      </div>
    {% endfor %}
  </div>

  <!-- INPUT SECTION -->
  <form action="/submit" method="POST" class="input-section" id="answerForm">
    <div class="input-wrapper">
      <input 
        type="text" 
        name="answer" 
        id="answerInput"
        placeholder="Type your answer here..." 
        required
        autocomplete="off"
      >
      <button type="submit">Send 📤</button>
    </div>
  </form>

  <script>
    // Auto-scroll to bottom
    const chatContainer = document.getElementById('chatContainer');
    chatContainer.scrollTop = chatContainer.scrollHeight;

    // Focus input on load
    document.getElementById('answerInput').focus();

    // Auto-submit on Ctrl+Enter or Cmd+Enter
    document.getElementById('answerInput').addEventListener('keydown', (e) => {
      if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
        document.getElementById('answerForm').submit();
      }
    });
  </script>

</body>
</html>
